    /* ── Base ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-in-up { animation: fadeInUp 0.8s ease-out forwards; opacity: 0; }
    .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }

    /* ── Hero reveal: slides up + fades in ── */
    @keyframes heroReveal {
      0%   { transform: translateY(50px); opacity: 0; filter: blur(4px); }
      100% { transform: translateY(0);    opacity: 1; filter: blur(0); }
    }
    .clip-reveal {
      animation-name: heroReveal;
      animation-duration: 1s;
      animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
      animation-fill-mode: forwards;
      opacity: 0;
    }

    .text-shimmer {
      color: white;
    }

    /* ── Falling particles ── */
    @keyframes fall {
      0%   { transform: translateY(-10%) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
    .particle {
      position: absolute;
      top: -20px;
      pointer-events: none;
      border-radius: 2px;
      animation-name: fall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    /* ── Expanding ring pulses behind icon ── */
    @keyframes ringPulse {
      0%   { transform: scale(1);   opacity: 0.25; }
      100% { transform: scale(2.8); opacity: 0; }
    }
    .ring-pulse       { animation: ringPulse 3s ease-out infinite; }
    .ring-pulse-delay { animation: ringPulse 3s ease-out 1.5s infinite; }

    /* ── Floating ambient orbs ── */
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(30px, -40px) scale(1.05); }
      66%      { transform: translate(-20px, 20px) scale(0.95); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(-40px, 30px) scale(0.95); }
      66%      { transform: translate(20px, -30px) scale(1.05); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0); }
      50%      { transform: translate(15px, -25px); }
    }
    .float-1 { animation: float1 20s ease-in-out infinite; }
    .float-2 { animation: float2 25s ease-in-out infinite; }
    .float-3 { animation: float3 15s ease-in-out infinite; }

    /* ── Horizontal line draw ── */
    @keyframes drawLine {
      from { width: 0; }
      to   { width: 80px; }
    }
    .line-draw { animation: drawLine 1s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards; width: 0; }

    /* ── Slow spin for corner decorations ── */
    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .spin-slow { animation: spinSlow 30s linear infinite; }

    /* ── Gentle breathe on icon ── */
    @keyframes breathe {
      0%, 100% { transform: scale(1);    opacity: 0.9; }
      50%      { transform: scale(1.06); opacity: 1; }
    }
    .breathe { animation: breathe 4s ease-in-out infinite; }

    /* ── Stagger delays ── */
    .delay-100  { animation-delay: 0.1s; }
    .delay-200  { animation-delay: 0.2s; }
    .delay-300  { animation-delay: 0.3s; }
    .delay-400  { animation-delay: 0.4s; }
    .delay-500  { animation-delay: 0.5s; }
    .delay-600  { animation-delay: 0.6s; }
    .delay-700  { animation-delay: 0.7s; }
    .delay-800  { animation-delay: 0.8s; }
    .delay-1000 { animation-delay: 1.0s; }
    .delay-1200 { animation-delay: 1.2s; }
    .delay-1600 { animation-delay: 1.6s; }

    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Rotating text: "Is Coming" ↔ "Coming Soon"
    (function() {
      var words = ['Is Coming', 'Coming Soon'];
      var el = document.getElementById('rotating-text');
      var i = 0;

      setInterval(function() {
        // Slide out
        el.style.transform = 'translateY(100%)';
        el.style.opacity = '0';

        setTimeout(function() {
          i = (i + 1) % words.length;
          el.textContent = words[i];
          // Reset to above
          el.style.transition = 'none';
          el.style.transform = 'translateY(-100%)';

          // Force reflow then slide in
          el.offsetHeight;
          el.style.transition = 'all 0.7s ease-in-out';
          el.style.transform = 'translateY(0)';
          el.style.opacity = '1';
        }, 700);
      }, 3000);
    })();
  </script>
</body>
</html>
